<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#0f0f0f" width="400" height="300"/>
  <!-- MacBook base -->
  <rect x="30" y="188" width="210" height="15" rx="3" fill="#bbb" opacity="0.45"/>
  <!-- MacBook lid -->
  <rect x="38" y="98" width="194" height="90" rx="7" fill="#b5b5b5" opacity="0.65"/>
  <rect x="45" y="104" width="180" height="77" rx="5" fill="#111"/>
  <!-- Phone (upright beside mac) -->
  <g transform="translate(280,148) rotate(-5) translate(-28,-64)">
    <rect x="0" y="0" width="56" height="128" rx="8" fill="white" opacity="0.9"/>
    <rect x="5" y="10" width="46" height="108" rx="4" fill="#111"/>
    <rect x="19" y="3" width="18" height="4" rx="2" fill="#ccc"/>
  </g>
  <!-- Watch (small, right side) -->
  <g transform="translate(348,165)">
    <rect x="-16" y="-22" width="32" height="44" rx="9" fill="#d0d0d0" opacity="0.75"/>
    <rect x="-12" y="-18" width="24" height="36" rx="6" fill="#111"/>
    <!-- Band hints -->
    <rect x="-10" y="-31" width="20" height="10" rx="3" fill="#b0b0b0" opacity="0.5"/>
    <rect x="-10" y="23" width="20" height="10" rx="3" fill="#b0b0b0" opacity="0.5"/>
  </g>
</svg>
